<!DOCTYPE html>
<html>
    <head>
        <title>FitPxl</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel = "stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="background"></div>
        <div class = "container">
            <h1>FitPxl</h1>

            <div class = "xpBar">
                <div class = "xpAmount" id="xpAmount">

                </div>

                <p id="xpText">Level 1 [0/100 XP]</p>
            </div>
            <div class = "card">
                <h2>Player Stats</h2>
                <p>Level: <span id="level">1</span></p>
                <p>XP: <span id ="xp">0</span></p>
                <p>Workouts: <span id="workouts">0</span></p>
            </div>
            <div class = "card">
                <h2>🔥Streak</h2>
                <p id="streak">0 Days</p>
            </div>
            <div class = "card">
                <h2>Weight</h2>
                <p id="weight">N/A</p>
            </div>
            <button id="logWorkout">
                Log Workout
            </button>
        </div>
        <script src = "script.js"></script>
    </body>
</html>
