<!DOCTYPE html>
<html>
    <head>
        <title>FitPxl</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel = "stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="background"></div>
        <div id="dashboard">
            <!--Profile/XP-->
            <section id="profileBar">
                <div id="profileLeft">
                    <div id="avatar"></div>
                    <div id="profileInfo">
                        <h2 id="username">Player</h2>
                        <p id="levelDisplay">Level <span id="level">1</span></p>
                    </div>
                </div>
                <div id="xpContainer">
                    <div id="xpAmount"></div>
                </div>
            </section>
            <!--Stats/Streak/Quests/Achievements-->

                <div class="card" id="statsCard">
                    <h2>Player Stats</h2>
                    <p>XP: <span id="xp">0</span></p>
                    <p>Workouts: <span id="workouts">0</span></p>
                    <p>Weight: <span id="weight">N/A</span></p>

                    <button id="logWeight">Log Weight</button>
                </div>
                <div class="card" id="streakCard">
                    <h2>Streak</h2>
                    <p id="streak">0 Days</p>
                </div>
                <div class="card" id="questsCard">
                    <h2>Daily Quest</h2>
                    <p id="dailyQuest">Complete a workout</p>
                    <h2>Weekly Quest</h2>
                    <p id="weeklyQuest">Complete 3 workouts</p>
                    <h2>Monthly Quest</h2>
                    <p id="monthlyQuest">Maintain a 21 day streak</p>
                </div>
    
            <section class="card" id="achievementsCard">
                <h2>Achievements</h2>
                <div id="achievements"></div>
            </section>
            <!--Workouts-->
            
                <div class="card" id="recentWorkoutsCard">
                    <h2>Recent Workouts</h2>
                    <div id="recentWorkouts"></div>
                </div>
                <div class="card" id="logWorkoutCard">
                    <h2>Log Workout</h2>
                    <button id="logWorkoutBtn">Log Workout</button>
                </div>
            
        </div>
        <div id="workoutWindow" class="hiddenWindow">
            <div class="workoutBox">
                <h2>Log Workout</h2>
                <div id="exerciseList"></div>
                <button id="addExercise">Add Exercise</button>
                <button id="saveWorkout">Save Workout</button>
                <button id="cancelWorkout">Cancel</button>
            </div>
        </div>
        <script src = "script.js"></script>
    </body>
</html>
